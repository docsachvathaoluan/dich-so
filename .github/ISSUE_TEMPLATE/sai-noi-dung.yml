name: "📖 Báo sai nội dung · Report a content error"
description: "Chỗ nào đó trên trang nói sai, hoặc nêu diễn giải như thể là sự thật · Something on the site is wrong, or states an interpretation as fact"
title: "[Nội dung] "
labels: ["nội dung", "cần đối chiếu"]
body:
  - type: markdown
    attributes:
      value: |
        **Cảm ơn bạn.** Đây là loại góp ý quý nhất với dự án này.

        Một lưu ý trước khi bạn viết: form này **bắt buộc có ô nguồn**. Không phải để làm khó bạn,
        mà vì trang này có thể là nơi ai đó lần đầu tiếp xúc Kinh Dịch một cách nghiêm túc, nên sửa
        một câu ở đây là **thay đổi điều người lạ sẽ tin**. Nguyên tắc đó áp cho cả chủ dự án.

        *Thanks for this, it's the most valuable kind of feedback here. Note this form **requires a
        source**: changing a sentence on this site changes what a stranger will believe.*

  - type: input
    id: vi-tri
    attributes:
      label: "Chỗ nào? · Where?"
      description: "Trang nào, quẻ số mấy, hào nào · Which page, which hexagram, which line"
      placeholder: "VD: trang 64 Quẻ → quẻ 17 (Tuỳ) → hào 3"
    validations:
      required: true

  - type: textarea
    id: hien-tai
    attributes:
      label: "Trang đang nói gì? · What does it currently say?"
      description: "Chép lại nguyên văn câu bạn cho là sai · Quote the exact text you think is wrong"
    validations:
      required: true

  - type: textarea
    id: dung-la
    attributes:
      label: "Theo bạn thì đúng là gì? · What should it say?"
    validations:
      required: true

  - type: textarea
    id: nguon
    attributes:
      label: "Nguồn · Source"
      description: |
        **Sách nào, tác giả nào, trang bao nhiêu.** Hoặc, nếu là chuyện số học, **cứ đưa phép tính ra đây**,
        không cần sách; đó là loại biên lai mạnh nhất trong dự án này.

        *Which book, which author, which page. Or, for arithmetic, just show the calculation. No book needed.*
      placeholder: |
        VD: Ngô Tất Tố, "Kinh Dịch trọn bộ", quẻ Tuỳ, hào Cửu Tam, tr. 212
        Hoặc: Tổng 9 số Lạc Thư = 1+2+…+9 = 45, không phải 55.
    validations:
      required: true

  - type: dropdown
    id: loai
    attributes:
      label: "Loại · Kind"
      options:
        - "Sai hẳn, nói ngược với nguồn · Plainly wrong, contradicts the source"
        - "Là dị bản: sách khác nói khác, nên ghi chú cả hai · A variant: sources differ, both should be noted"
        - "Nêu diễn giải như định lý, thiếu ghi chú trung thực · States interpretation as theorem, missing honesty note"
        - "Số học không kiểm được · Arithmetic that doesn't check out"
        - "Bản tiếng Anh dịch sai · The English translation is wrong"
    validations:
      required: true

  - type: markdown
    attributes:
      value: |
        > 💡 Nếu các sách **mâu thuẫn nhau**, đó **không phải lỗi cần sửa** mà là **dị bản cần ghi chú**:
        > kết quả đúng sẽ là ghi rõ có nhiều cách hiểu và ai nói gì. Cứ gửi, đó chính là làm đúng.
        >
        > *If sources contradict each other, that's not a bug. It's a variant to annotate. Send it anyway.*
