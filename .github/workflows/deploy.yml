name: Deploy lên GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch: # cho phép bấm deploy thủ công từ tab Actions

permissions:
  contents: read
  pages: write
  id-token: write

# Nếu đẩy nhiều commit liên tiếp, để lần deploy đang chạy xong đã rồi mới tới lần sau —
# tránh hai lần deploy giẫm lên nhau.
concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    name: Build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Cài phụ thuộc
        run: npm ci

      # Không deploy nếu số liệu đã lệch — thà site cũ còn hơn site sai.
      - name: Chạy bộ kiểm tra
        run: npm test

      - uses: actions/configure-pages@v5

      - name: Build
        run: npm run build

      # GitHub Pages là server tĩnh, không có luật rewrite: mở thẳng /dich-so/64-que thì
      # nó đi tìm một file tên "64-que", không thấy, và trả trang 404. Đặt bản sao của
      # index.html làm trang 404 → ứng dụng vẫn khởi động và tự định tuyến đúng, nên
      # link chia sẻ tới từng trang vẫn chạy.
      - name: Bản sao 404.html cho link sâu
        run: cp dist/index.html dist/404.html

      - uses: actions/upload-pages-artifact@v3
        with:
          path: dist

  deploy:
    name: Deploy
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
